<!--- criar an interface para o software usando o backend em python -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login SCE</title>
    <link rel="stylesheet" type="text/css" href="login.css">
    <script src="login.js" defer></script> <!-- backend da janela  -->
</head>
<body>

<div id="backimg"></div>

<img src="../../image/logo.png" alt="">

<div class="backgroundRegisterLogin">
    <div class="glassLogin">
        <h1>BEM</br>VINDO</h1>
        <label>
            <p>Usuário</p>
            <input id='InputName', type="text">
            <p>Senha</p>
            <input id="InputPassword" type="password">
            <button id='Buttonview'
                    type="button"
                    onclick="togglePasswordVisibility()">
                <img id='iconEye' src="../../image/Invisible.png" alt="" style="width: 25px;height: 25px;">
            </button><br><br>
            <button id="loginbutton" onclick="getLogin()">Acessar</button>
        </label>

    </div>

</div>
</body>
</html>
