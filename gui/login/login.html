<!--- criar an interface para o software usando o backend em python -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login SCE</title>
    <link rel="stylesheet" type="text/css" href="login.css">
    <link rel="stylesheet" type="text/css" href="robot.css">
    <script src="login.js" defer></script> <!-- animação do olho -->
</head>
<body>

<div id="backimg"></div>

<img src="../../image/logo.png" alt="">

<div class="backgroundRegisterLogin">
    <div class="glassLogin">

        <!-- robo para animação na tela de login -->
        <div class="labelrobot">

            <!-- braço esquerdo -->
            <div class="arm left">
                <div class="shoulder"></div>
                <div class="upper">
                </div>
            </div>

            <!-- placa -->
            <div class="sign"><p>Welcome</p>
            </div>

            <!-- braço direito -->
            <div class="arm right">
                <div class="shoulder"></div>
                <div class="upper">
                    <div class="elbow"></div>
                    <div class="forearm">
                        <div class="hand"></div>
                    </div>
                </div>
            </div>

            <!-- olhos -->
            <div class="eye">
                <div class="iris"></div>
            </div>
            <div class="eye">
                <div class="iris"></div>
            </div>
        </div>

        <label>
            <p>Usuário</p>
            <input>
            <p>Senha</p>
            <input id="senha"><br><br>
            <button id="loginbutton">Acessar</button>
        </label>

    </div>

</div>
</body>
</html>
